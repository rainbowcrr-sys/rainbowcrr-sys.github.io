<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:2rem;color:#111}a{color:inherit}</style>
  </head>
  <body>
    <header>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <nav><a href="{{ '/tutorials/' | relative_url }}">Tutorials</a> | <a href="{{ '/about/' | relative_url }}">About</a></nav>
      <hr>
    </header>
    <main>
      {{ content }}
    </main>
    <footer>
      <hr>
      <small>© {{ site.time | date: "%Y" }} RainbowCRR</small>
    </footer>
  </body>
</html>
