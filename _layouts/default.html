<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
      :root{--max-w:780px;--muted:#6b7280}
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;color:#111;background:#fff}
      .site{max-width:var(--max-w);margin:2rem auto;padding:0 1rem}
      header h1{margin:.25rem 0}
      nav{color:var(--muted);font-size:0.95rem}
      main{line-height:1.6}
      pre, code{background:#f3f4f6;padding:.2rem .4rem;border-radius:4px;font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Helvetica Neue", monospace}
      footer{color:var(--muted);font-size:0.9rem;margin-top:2rem}
      a{color:#0b5fff}
      hr{border:none;border-top:1px solid #e6e6e6;margin:1rem 0}
    </style>
  </head>
  <body>
    <div class="site">
      <header>
        <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        <nav><a href="{{ '/tutorials/' | relative_url }}">Tutorials</a> | <a href="{{ '/about/' | relative_url }}">About</a></nav>
        <hr>
      </header>
      <main>
        {{ content }}
      </main>
      <footer>
        <hr>
        <small>© {{ site.time | date: "%Y" }} RainbowCRR</small>
      </footer>
    </div>
  </body>
</html>
