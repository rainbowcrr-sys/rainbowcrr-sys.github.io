<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="icon" href="{{ '/assets/icons/favicon.svg' | relative_url }}" type="image/svg+xml">
  </head>
  <body>
    <div class="site" id="site-root">
      <header>
        <div class="top-row">
          <h1 class="brand"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <nav class="nav" role="navigation" aria-label="Main navigation">
            {% for item in site.navigation %}
              <a class="nav-item" href="{{ item.url | relative_url }}">
                <svg class="icon" aria-hidden="true"><use xlink:href="{{ '/assets/icons/icons.svg#' | relative_url }}{{ item.title | downcase | replace: ' ', '-' }}"></use></svg>
                <span class="nav-label">{{ item.title }}</span>
              </a>
            {% endfor %}
          </nav>
          <div class="controls">
            <button id="homepage-toggle" class="ctrl-btn" aria-label="Toggle homepage layout">
              <svg class="icon"><use xlink:href="{{ '/assets/icons/icons.svg#swap' | relative_url }}"></use></svg>
            </button>
            <button id="theme-toggle" class="ctrl-btn" aria-label="Toggle theme">
              <svg class="icon" id="theme-icon"><use xlink:href="{{ '/assets/icons/icons.svg#moon' | relative_url }}"></use></svg>
            </button>
          </div>
        </div>
        <hr>
      </header>

      <main id="main-content">
        {{ content }}
      </main>

      <footer>
        <hr>
        <small>© {{ site.time | date: "%Y" }} RainbowCRR — {{ site.description }}</small>
      </footer>
    </div>

    <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
  </body>
</html>
